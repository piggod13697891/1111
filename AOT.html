<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Account Opening Tool</title>
    <style>
        /* 初始页面整体样式 */
        body {
            background-color: #E6F7FF; /* 修改初始页面背景色为浅蓝色 */
            margin: 0;
            padding: 0;
        }

        /* 标题容器居中 */
        .title-container {
            text-align: center;
            margin: 30px 0; /* 标题上下边距 */
        }

        /* 按钮容器居中 */
        .btn-container {
            text-align: center;
            margin: 50px 0; /* 按钮上下边距 */
        }

        .test-btn {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }

        .test-btn:hover {
            background-color: #45a049;
        }

        /* 目标页面内容居中样式 */
        .target-content {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
<!-- 标题容器，用于居中标题 -->
<div class="title-container">
    <h1>Account Opening Tool</h1>
</div>

<!-- 按钮容器，用于居中按钮 -->
<div class="btn-container">
    <button class="test-btn" onclick="openTargetPage()">Test</button>
</div>

<script>
    function openTargetPage() {
        // 目标界面HTML（内容保持居中）
        const targetHtml = `
                <!DOCTYPE html>
                <html lang="zh-CN">
                <head>
                    <meta charset="UTF-8">
                    <title>Account Opening Tool</title>
                    <style>
                        .content {
                            text-align: center;
                            padding: 50px;
                        }
                    </style>
                </head>
                <body style="background-color: #CCFFCC;">
                    <div class="content">
                        <h1>Account Opening Tool</h1>
                        <h4>name:高晨逸</h4>
                        <h4>place:中國大陸</h4>
                        <h4>Language:繁體中文</h4>
                    </div>
                </body>
                </html>
            `;

        const newWindow = window.open('about:blank', '_blank');
        newWindow.document.write(targetHtml);
        newWindow.document.close();
    }
</script>
</body>
</html>
